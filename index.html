<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Apartament"/>
  <meta name="theme-color" content="#0f172a"/>
  <title>Admin Apartament 4</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;background:#0f172a;font-family:-apple-system,'Inter','Segoe UI',sans-serif;}
    input[type=number]{-moz-appearance:textfield;}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
    button,select,input{-webkit-appearance:none;font-family:inherit;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .pulse{animation:pulse 1.5s infinite;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#1e293b;}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const SUPABASE_URL="https://nivbwjpkchxbqtndshae.supabase.co";
const SUPABASE_KEY="sb_publishable_LL4x1Gnyfm_wvTK44M1X3Q_tlYVX9uW";
const H={"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`};

const LUNI=["Ian","Feb","Mar","Apr","Mai","Iun","Iul","Aug","Sep","Oct","Nov","Dec"];
const LUNI_FULL=["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];
const CY=new Date().getFullYear();
const CM=new Date().getMonth();

// Dark theme tokens
const D={
  bg:"#0f172a", card:"#1e293b", card2:"#263347", border:"#334155",
  text:"#f1f5f9", muted:"#94a3b8", sub:"#64748b",
  blue:"#3b82f6", green:"#22c55e", red:"#ef4444",
  header:"linear-gradient(90deg,#1e3a5f,#1d4ed8)"
};

async function dbLoad(table){
  const o=table==="citiri"?"an.asc,luna_index.asc,data.asc":"an.asc,luna_index.asc";
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&order=${o}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function dbInsert(table,row){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:"POST",headers:{...H,"Prefer":"return=representation"},body:JSON.stringify(row)});
  if(!r.ok)throw new Error(await r.text());
  return(await r.json())[0];
}
async function dbDelete(table,id){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers:H});
  if(!r.ok)throw new Error(await r.text());
}
function calcConsum(e){return(parseFloat(e.bucatarie_nou)-parseFloat(e.bucatarie_vechi))+(parseFloat(e.baie_nou)-parseFloat(e.baie_vechi));}
function DropIcon(){return React.createElement("svg",{width:14,height:18,viewBox:"0 0 18 22",fill:"none"},React.createElement("path",{d:"M9 2C9 2 2 9.5 2 14a7 7 0 0 0 14 0C16 9.5 9 2 9 2Z",fill:"currentColor",opacity:"0.9"}));}

// ── MonthPicker ──────────────────────────────────────────────
function MonthPicker({selectedMonth,selectedYear,onChange,history}){
  const [year,setYear]=useState(selectedYear);
  const saved=new Set(history.map(e=>`${e.luna_index}-${e.an}`));
  return(
    <div style={{background:D.card,borderRadius:18,padding:"16px 14px",marginBottom:18,border:`1px solid ${D.border}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>setYear(y=>y-1)} style={{background:D.card2,border:"none",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18,color:D.text,fontWeight:700}}>‹</button>
        <span style={{fontWeight:800,fontSize:17,color:D.text}}>{year}</span>
        <button onClick={()=>setYear(y=>y+1)} style={{background:D.card2,border:"none",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18,color:D.text,fontWeight:700}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {LUNI.map((l,i)=>{
          const isSel=selectedMonth===i&&selectedYear===year;
          const isSaved=saved.has(`${i}-${year}`);
          const isCur=i===CM&&year===CY;
          return(
            <button key={i} onClick={()=>onChange(i,year)} style={{
              padding:"10px 4px",borderRadius:10,position:"relative",
              border:isSel?`2px solid ${D.blue}`:isCur?`2px solid #3b82f655`:`2px solid transparent`,
              background:isSel?"linear-gradient(135deg,#1d4ed8,#1e3a5f)":isCur?`${D.blue}18`:D.card2,
              color:isSel?"#fff":D.text,fontWeight:isSel?700:500,fontSize:13,cursor:"pointer",
            }}>
              {l}
              {isSaved&&<span style={{position:"absolute",top:3,right:5,width:5,height:5,borderRadius:"50%",background:isSel?"#fff":D.green,display:"block"}}/>}
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",gap:14,marginTop:10}}>
        <span style={{fontSize:11,color:D.sub,display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:D.green,display:"inline-block"}}/> Salvat</span>
        <span style={{fontSize:11,color:D.sub,display:"flex",alignItems:"center",gap:4}}><span style={{display:"inline-block",width:11,height:11,borderRadius:3,border:`2px solid ${D.blue}55`,background:`${D.blue}18`}}/> Luna curentă</span>
      </div>
    </div>
  );
}

// ── WaterCard ────────────────────────────────────────────────
function WaterCard({label,emoji,vechi,nou,onChangeNou,color}){
  const consum=nou!==""&&vechi!==""?(parseFloat(nou)-parseFloat(vechi)).toFixed(0):null;
  const consumOk=consum!==null&&!isNaN(consum)&&parseFloat(consum)>=0;
  const hasVechi=vechi!==""&&vechi!==null&&vechi!==undefined;
  return(
    <div style={{background:D.card,borderRadius:18,padding:"18px 16px",flex:1,minWidth:140,border:`1px solid ${D.border}`,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-14,right:-14,width:60,height:60,borderRadius:"50%",background:`${color}18`,pointerEvents:"none"}}/>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <span style={{fontSize:22}}>{emoji}</span>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:D.text}}>{label}</div>
          <div style={{fontSize:11,color:D.sub}}>Index contor</div>
        </div>
      </div>
      <div style={{marginBottom:10,background:D.card2,borderRadius:10,padding:"10px 12px",border:`1px solid ${D.border}`}}>
        <div style={{fontSize:10,fontWeight:600,color:D.sub,textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:4}}>Index vechi</div>
        {hasVechi?(
          <div style={{fontSize:20,fontWeight:700,color:D.muted,fontVariantNumeric:"tabular-nums"}}>{parseInt(parseFloat(vechi))}</div>
        ):(
          <div style={{fontSize:12,color:D.sub,fontStyle:"italic"}}>Prima citire</div>
        )}
      </div>
      <label style={{display:"flex",flexDirection:"column",gap:4}}>
        <span style={{fontSize:10,fontWeight:600,color:D.sub,textTransform:"uppercase",letterSpacing:"0.4px"}}>Index nou</span>
        <input type="number" step="1" min="0" placeholder="ex: 125" value={nou} onChange={e=>onChangeNou(e.target.value)}
          style={{border:`1.5px solid ${color}66`,borderRadius:10,padding:"11px 12px",fontSize:20,color:D.text,outline:"none",fontVariantNumeric:"tabular-nums",background:D.card2,width:"100%",fontWeight:700}}
          onFocus={e=>e.target.style.border=`2px solid ${color}`}
          onBlur={e=>e.target.style.border=`1.5px solid ${color}66`}
        />
      </label>
      {consumOk&&(
        <div style={{marginTop:10,background:`${color}18`,borderRadius:10,padding:"9px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",border:`1px solid ${color}30`}}>
          <div style={{display:"flex",alignItems:"center",gap:6,color}}><DropIcon/><span style={{fontSize:12,fontWeight:600}}>Consum</span></div>
          <span style={{fontSize:18,fontWeight:800,color,fontVariantNumeric:"tabular-nums"}}>{consum} <span style={{fontSize:11,fontWeight:500}}>m³</span></span>
        </div>
      )}
      {consum!==null&&!isNaN(consum)&&parseFloat(consum)<0&&(
        <div style={{marginTop:8,color:D.red,fontSize:12,background:"#ef444420",borderRadius:8,padding:"7px 10px"}}>⚠️ Trebuie mai mare decât {parseInt(parseFloat(vechi))}.</div>
      )}
    </div>
  );
}

// ── Grafic Facturi ───────────────────────────────────────────
function GraficFacturi({facturi}){
  if(facturi.length===0)return null;
  const maxVal=Math.max(...facturi.map(f=>parseFloat(f.total_plata)));
  const last12=facturi.slice(-12);
  return(
    <div style={{background:D.card,borderRadius:18,padding:"18px 16px",marginBottom:16,border:`1px solid ${D.border}`}}>
      <div style={{fontWeight:700,color:D.text,fontSize:14,marginBottom:16}}>📊 Evoluție plăți lunare</div>
      <div style={{display:"flex",alignItems:"flex-end",gap:6,height:120}}>
        {last12.map((f,i)=>{
          const h=Math.max(8,Math.round((parseFloat(f.total_plata)/maxVal)*110));
          const isLast=i===last12.length-1;
          return(
            <div key={f.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{fontSize:9,color:D.sub,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{parseFloat(f.total_plata).toFixed(0)}</div>
              <div style={{width:"100%",height:h,borderRadius:"6px 6px 3px 3px",background:isLast?"linear-gradient(180deg,#22c55e,#16a34a)":"linear-gradient(180deg,#3b82f6,#1d4ed8)",transition:"height 0.3s"}}/>
              <div style={{fontSize:9,color:D.sub,textAlign:"center",lineHeight:1.2}}>{f.luna.split(" ")[0]}</div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:`1px solid ${D.border}`}}>
        <span style={{fontSize:11,color:D.sub}}>Min: <b style={{color:D.text}}>{Math.min(...facturi.map(f=>parseFloat(f.total_plata))).toFixed(0)} lei</b></span>
        <span style={{fontSize:11,color:D.sub}}>Max: <b style={{color:D.text}}>{maxVal.toFixed(0)} lei</b></span>
        <span style={{fontSize:11,color:D.sub}}>Med: <b style={{color:D.text}}>{(facturi.reduce((a,f)=>a+parseFloat(f.total_plata),0)/facturi.length).toFixed(0)} lei</b></span>
      </div>
    </div>
  );
}

// ── Tab Apă ──────────────────────────────────────────────────
function TabApa({citiri,setCitiri}){
  const [selMonth,setSelMonth]=useState(CM);
  const [selYear,setSelYear]=useState(CY);
  const [bucNou,setBucNou]=useState("");
  const [baieNou,setBaieNou]=useState("");
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [error,setError]=useState(null);
  const [deletingId,setDeletingId]=useState(null);
  const [view,setView]=useState("introduce");

  const lastBuc=citiri.length>0?String(citiri[citiri.length-1].bucatarie_nou):"";
  const lastBaie=citiri.length>0?String(citiri[citiri.length-1].baie_nou):"";

  const handleMonthChange=(m,y)=>{setSelMonth(m);setSelYear(y);setBucNou("");setBaieNou("");};
  const consumBuc=bucNou!==""&&lastBuc!==""?parseFloat(bucNou)-parseFloat(lastBuc):null;
  const consumBaie=baieNou!==""&&lastBaie!==""?parseFloat(baieNou)-parseFloat(lastBaie):null;
  const totalConsum=consumBuc!==null&&consumBaie!==null&&consumBuc>=0&&consumBaie>=0?(consumBuc+consumBaie).toFixed(0):null;
  const canSave=totalConsum!==null&&!saving;

  const handleSave=async()=>{
    if(!canSave)return;
    setSaving(true);setError(null);
    try{
      const luna=`${LUNI_FULL[selMonth]} ${selYear}`;
      const row={data:luna,luna,luna_index:selMonth,an:selYear,bucatarie_vechi:parseFloat(lastBuc)||0,bucatarie_nou:parseFloat(bucNou),baie_vechi:parseFloat(lastBaie)||0,baie_nou:parseFloat(baieNou)};
      const r=await dbInsert("citiri",row);
      setCitiri(h=>[...h,r].sort((a,b)=>a.an-b.an||a.luna_index-b.luna_index));
      setSaved(true);setTimeout(()=>setSaved(false),2500);
      setBucNou("");setBaieNou("");
    }catch(e){setError("Eroare la salvare.");}
    finally{setSaving(false);}
  };
  const handleDelete=async(id)=>{
    setDeletingId(id);
    try{await dbDelete("citiri",id);setCitiri(h=>h.filter(e=>e.id!==id));}
    catch(e){setError("Eroare la ștergere.");}
    finally{setDeletingId(null);}
  };

  const totalCum=citiri.reduce((acc,e)=>acc+calcConsum(e),0);
  const avg=citiri.length>0?totalCum/citiri.length:0;
  let running=0;
  const withCumul=citiri.map(e=>{running+=calcConsum(e);return{...e,cumulative:running};});

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {["introduce","istoric"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"10px",borderRadius:12,border:"none",background:view===v?D.blue:D.card,color:view===v?"#fff":D.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
            {v==="introduce"?"✏️ Introduce":"📋 Istoric"}
          </button>
        ))}
      </div>
      {error&&<div style={{background:"#ef444420",color:"#fca5a5",padding:"10px 14px",fontSize:13,borderRadius:10,marginBottom:14,fontWeight:600}}>⚠️ {error}</div>}

      {view==="introduce"&&(
        <div>
          <div style={{fontSize:10,fontWeight:600,color:D.sub,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>📅 Selectează luna</div>
          <MonthPicker selectedMonth={selMonth} selectedYear={selYear} onChange={handleMonthChange} history={citiri}/>
          <div style={{background:`${D.blue}18`,border:`1px solid ${D.blue}44`,borderRadius:12,padding:"9px 14px",marginBottom:14,color:D.blue,fontWeight:700,fontSize:13}}>
            📌 {LUNI_FULL[selMonth]} {selYear}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
            <WaterCard label="Bucătărie" emoji="🍽️" color="#3b82f6" vechi={lastBuc} nou={bucNou} onChangeNou={v=>setBucNou(v)}/>
            <WaterCard label="Baie" emoji="🛁" color="#22c55e" vechi={lastBaie} nou={baieNou} onChangeNou={v=>setBaieNou(v)}/>
          </div>
          {totalConsum&&(
            <div style={{background:"linear-gradient(90deg,#1e3a5f,#1d4ed8)",borderRadius:14,padding:"14px 18px",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,opacity:0.7,marginBottom:2}}>Consum total citire</div>
                <div style={{fontSize:26,fontWeight:900,fontVariantNumeric:"tabular-nums"}}>{totalConsum} <span style={{fontSize:13,fontWeight:500}}>m³</span></div>
              </div>
              <div style={{display:"flex",gap:14}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:10,opacity:0.65}}>🍽️ Buc.</div><div style={{fontWeight:700,fontSize:15}}>{consumBuc.toFixed(0)}</div></div>
                <div style={{width:1,background:"rgba(255,255,255,0.2)"}}/>
                <div style={{textAlign:"center"}}><div style={{fontSize:10,opacity:0.65}}>🛁 Baie</div><div style={{fontWeight:700,fontSize:15}}>{consumBaie.toFixed(0)}</div></div>
              </div>
            </div>
          )}
          <button onClick={handleSave} disabled={!canSave} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:canSave?"linear-gradient(90deg,#22c55e,#16a34a)":D.card,color:canSave?"#fff":D.sub,fontSize:15,fontWeight:700,cursor:canSave?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {saving?<div className="spinner"/>:saved?"✅ Salvat!":"💾 Salvează în Baza de Date"}
          </button>
        </div>
      )}

      {view==="istoric"&&(
        <div>
          <div style={{background:"linear-gradient(135deg,#1e3a5f,#1d4ed8)",borderRadius:18,padding:"18px",marginBottom:12,color:"#fff"}}>
            <div style={{fontSize:10,opacity:0.7,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>💧 Total apă consumată</div>
            <div style={{fontSize:36,fontWeight:900,lineHeight:1}}>{totalCum.toFixed(0)}<span style={{fontSize:15,fontWeight:500,marginLeft:5}}>m³</span></div>
            <div style={{fontSize:11,opacity:0.6,marginTop:4,marginBottom:12}}>din {citiri.length} citiri</div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1,background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"9px",textAlign:"center"}}>
                <div style={{fontSize:10,opacity:0.7}}>Medie / citire</div>
                <div style={{fontSize:17,fontWeight:800}}>{avg.toFixed(1)} m³</div>
              </div>
              <div style={{flex:1,background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"9px",textAlign:"center"}}>
                <div style={{fontSize:10,opacity:0.7}}>Ultima citire</div>
                <div style={{fontSize:17,fontWeight:800}}>{citiri.length>0?calcConsum(citiri[citiri.length-1]).toFixed(0)+" m³":"-"}</div>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[{label:"🍽️ Bucătărie",color:"#3b82f6",val:citiri.reduce((a,e)=>a+(parseFloat(e.bucatarie_nou)-parseFloat(e.bucatarie_vechi)),0)},{label:"🛁 Baie",color:"#22c55e",val:citiri.reduce((a,e)=>a+(parseFloat(e.baie_nou)-parseFloat(e.baie_vechi)),0)}].map(({label,color,val})=>(
              <div key={label} style={{flex:1,background:D.card,borderRadius:14,padding:"12px",border:`1px solid ${D.border}`,textAlign:"center"}}>
                <div style={{fontSize:11,color:D.sub,marginBottom:3}}>{label}</div>
                <div style={{fontSize:22,fontWeight:800,color}}>{val.toFixed(0)} <span style={{fontSize:11,fontWeight:500,color:D.sub}}>m³</span></div>
                <div style={{fontSize:10,color:D.sub,marginTop:2}}>{totalCum>0?((val/totalCum)*100).toFixed(0):0}%</div>
              </div>
            ))}
          </div>
          {withCumul.length===0?(
            <div style={{textAlign:"center",padding:"40px 20px",color:D.sub,background:D.card,borderRadius:16,border:`1px dashed ${D.border}`}}>
              <div style={{fontSize:36,marginBottom:8}}>💧</div>
              <div style={{fontWeight:600,color:D.muted}}>Nicio citire salvată</div>
            </div>
          ):withCumul.map(entry=>{
            const buc=parseFloat(entry.bucatarie_nou)-parseFloat(entry.bucatarie_vechi);
            const baie=parseFloat(entry.baie_nou)-parseFloat(entry.baie_vechi);
            return(
              <div key={entry.id} style={{borderRadius:14,background:D.card,border:`1px solid ${D.border}`,marginBottom:8,overflow:"hidden",opacity:deletingId===entry.id?0.4:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"11px 14px 5px",flexWrap:"wrap"}}>
                  <div style={{flex:"1 1 auto",fontWeight:700,color:D.text,fontSize:13}}>📅 {entry.luna}</div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:12,color:D.sub}}>🍽️ <b style={{color:"#3b82f6"}}>{buc.toFixed(0)}</b></span>
                    <span style={{fontSize:12,color:D.sub}}>🛁 <b style={{color:"#22c55e"}}>{baie.toFixed(0)}</b></span>
                    <span style={{fontSize:12,background:D.blue,color:"#fff",borderRadius:6,padding:"2px 8px",fontWeight:700}}>{(buc+baie).toFixed(0)} m³</span>
                  </div>
                  <button onClick={()=>handleDelete(entry.id)} style={{background:"none",border:"none",cursor:"pointer",color:D.border,fontSize:16,padding:"2px 4px"}}>✕</button>
                </div>
                <div style={{padding:"4px 14px 9px",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:10,color:D.sub,whiteSpace:"nowrap"}}>Cumulat:</span>
                  <div style={{flex:1,background:D.card2,borderRadius:99,height:4}}>
                    <div style={{height:"100%",borderRadius:99,background:`linear-gradient(90deg,${D.blue},#60a5fa)`,width:`${Math.min(100,(entry.cumulative/40)*100)}%`}}/>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:D.blue,whiteSpace:"nowrap"}}>{entry.cumulative.toFixed(0)} m³</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Tab Tabel Admin ──────────────────────────────────────────
function TabFacturi({facturi,setFacturi}){
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [error,setError]=useState(null);
  const [deletingId,setDeletingId]=useState(null);
  const [luna,setLuna]=useState(LUNI_FULL[CM]);
  const [an,setAn]=useState(String(CY));
  const [total,setTotal]=useState("");
  const [view,setView]=useState("adauga");

  const handleSave=async()=>{
    if(!total||!luna||!an)return;
    setSaving(true);setError(null);
    const lunaIdx=LUNI_FULL.findIndex(l=>l.toLowerCase()===luna.toLowerCase());
    try{
      const row={luna:`${luna} ${an}`,luna_index:lunaIdx>=0?lunaIdx:0,an:parseInt(an),total_plata:parseFloat(total)};
      const r=await dbInsert("facturi",row);
      setFacturi(h=>[...h,r].sort((a,b)=>a.an-b.an||a.luna_index-b.luna_index));
      setSaved(true);setTimeout(()=>setSaved(false),2500);
      setTotal("");
    }catch(e){setError("Eroare la salvare.");}
    finally{setSaving(false);}
  };
  const handleDelete=async(id)=>{
    setDeletingId(id);
    try{await dbDelete("facturi",id);setFacturi(h=>h.filter(e=>e.id!==id));}
    catch(e){setError("Eroare la ștergere.");}
    finally{setDeletingId(null);}
  };

  const totalAnual=facturi.filter(f=>f.an===CY).reduce((a,f)=>a+parseFloat(f.total_plata),0);
  const totalGeneral=facturi.reduce((a,f)=>a+parseFloat(f.total_plata),0);
  const canSave=total&&!saving;

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {[["adauga","➕ Adaugă"],["istoric","📋 Istoric"]].map(([v,lbl])=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"10px",borderRadius:12,border:"none",background:view===v?D.blue:D.card,color:view===v?"#fff":D.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
            {lbl}
          </button>
        ))}
      </div>
      {error&&<div style={{background:"#ef444420",color:"#fca5a5",padding:"10px 14px",fontSize:13,borderRadius:10,marginBottom:14,fontWeight:600}}>⚠️ {error}</div>}

      {view==="adauga"&&(
        <div style={{background:D.card,borderRadius:18,padding:"20px 16px",border:`1px solid ${D.border}`}}>
          <div style={{fontWeight:700,color:D.text,marginBottom:16,fontSize:15}}>🏢 Adaugă tabel administrație</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <label style={{display:"flex",flexDirection:"column",gap:5}}>
              <span style={{fontSize:10,fontWeight:600,color:D.sub,textTransform:"uppercase",letterSpacing:"0.4px"}}>Luna</span>
              <select value={luna} onChange={e=>setLuna(e.target.value)}
                style={{border:`1px solid ${D.border}`,borderRadius:10,padding:"10px 12px",fontSize:15,color:D.text,outline:"none",background:D.card2}}>
                {LUNI_FULL.map(l=><option key={l} value={l}>{l}</option>)}
              </select>
            </label>
            <label style={{display:"flex",flexDirection:"column",gap:5}}>
              <span style={{fontSize:10,fontWeight:600,color:D.sub,textTransform:"uppercase",letterSpacing:"0.4px"}}>Anul</span>
              <input type="number" value={an} onChange={e=>setAn(e.target.value)}
                style={{border:`1px solid ${D.border}`,borderRadius:10,padding:"10px 12px",fontSize:15,color:D.text,outline:"none",background:D.card2}}
                onFocus={e=>e.target.style.border=`1px solid ${D.blue}`}
                onBlur={e=>e.target.style.border=`1px solid ${D.border}`}
              />
            </label>
            <label style={{display:"flex",flexDirection:"column",gap:5}}>
              <span style={{fontSize:10,fontWeight:600,color:D.sub,textTransform:"uppercase",letterSpacing:"0.4px"}}>Total de plată (lei)</span>
              <input type="number" placeholder="ex: 322" value={total} onChange={e=>setTotal(e.target.value)}
                style={{border:`1.5px solid ${D.green}66`,borderRadius:10,padding:"12px 12px",fontSize:22,color:D.text,outline:"none",background:D.card2,fontVariantNumeric:"tabular-nums",fontWeight:700}}
                onFocus={e=>e.target.style.border=`2px solid ${D.green}`}
                onBlur={e=>e.target.style.border=`1.5px solid ${D.green}66`}
              />
            </label>
            <button onClick={handleSave} disabled={!canSave} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:canSave?"linear-gradient(90deg,#22c55e,#16a34a)":D.card2,color:canSave?"#fff":D.sub,fontSize:15,fontWeight:700,cursor:canSave?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {saving?<div className="spinner"/>:saved?"✅ Salvat!":"💾 Salvează"}
            </button>
          </div>
        </div>
      )}

      {view==="istoric"&&(
        <div>
          {/* Stats */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={{flex:1,background:"linear-gradient(135deg,#1e3a5f,#1d4ed8)",borderRadius:14,padding:"14px",color:"#fff",textAlign:"center"}}>
              <div style={{fontSize:10,opacity:0.7,marginBottom:4}}>Total {CY}</div>
              <div style={{fontSize:22,fontWeight:900}}>{totalAnual.toFixed(0)} <span style={{fontSize:12,fontWeight:500}}>lei</span></div>
            </div>
            <div style={{flex:1,background:D.card,borderRadius:14,padding:"14px",border:`1px solid ${D.border}`,textAlign:"center"}}>
              <div style={{fontSize:10,color:D.sub,marginBottom:4}}>Total general</div>
              <div style={{fontSize:22,fontWeight:900,color:D.text}}>{totalGeneral.toFixed(0)} <span style={{fontSize:12,fontWeight:500,color:D.sub}}>lei</span></div>
            </div>
          </div>

          {/* Grafic */}
          <GraficFacturi facturi={facturi}/>

          {/* Lista */}
          {facturi.length===0?(
            <div style={{textAlign:"center",padding:"40px 20px",color:D.sub,background:D.card,borderRadius:16,border:`1px dashed ${D.border}`}}>
              <div style={{fontSize:36,marginBottom:8}}>🏢</div>
              <div style={{fontWeight:600,color:D.muted}}>Niciun tabel salvat</div>
            </div>
          ):facturi.map(f=>(
            <div key={f.id} style={{background:D.card,borderRadius:14,border:`1px solid ${D.border}`,padding:"13px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",opacity:deletingId===f.id?0.4:1}}>
              <div style={{fontWeight:700,color:D.text,fontSize:13}}>📅 {f.luna}</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:19,fontWeight:800,color:D.green,fontVariantNumeric:"tabular-nums"}}>{parseFloat(f.total_plata).toFixed(0)} <span style={{fontSize:12,fontWeight:500,color:D.sub}}>lei</span></span>
                <button onClick={()=>handleDelete(f.id)} style={{background:"none",border:"none",cursor:"pointer",color:D.border,fontSize:16,padding:"2px 4px"}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("apa");
  const [citiri,setCitiri]=useState([]);
  const [facturi,setFacturi]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);

  useEffect(()=>{
    Promise.all([dbLoad("citiri"),dbLoad("facturi")])
      .then(([c,f])=>{setCitiri(c);setFacturi(f);})
      .catch(()=>setError("Nu s-a putut conecta la baza de date."))
      .finally(()=>setLoading(false));
  },[]);

  return(
    <div style={{minHeight:"100vh",background:D.bg,paddingBottom:80}}>
      <div style={{background:D.header,padding:"env(safe-area-inset-top,20px) 20px 20px",textAlign:"center",color:"#fff",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10,marginBottom:3}}>
          <span style={{fontSize:26}}>🏠</span>
          <h1 style={{margin:0,fontSize:19,fontWeight:800,letterSpacing:"-0.5px"}}>Admin Apartament 4</h1>
        </div>
        <p style={{margin:0,opacity:0.6,fontSize:11}}>Florescu • Str. Mrs. C-tin Prezan</p>
      </div>

      {error&&<div style={{background:"#ef444420",color:"#fca5a5",padding:"10px 16px",fontSize:13,textAlign:"center",fontWeight:600}}>⚠️ {error}</div>}

      <div style={{maxWidth:680,margin:"0 auto",padding:"18px 14px 0"}}>
        {loading?(
          <div style={{textAlign:"center",padding:"60px 20px",color:D.sub}}>
            <div style={{fontSize:36,marginBottom:10}} className="pulse">🏠</div>
            <div style={{fontWeight:600,color:D.muted}}>Se încarcă datele...</div>
          </div>
        ):(
          <>
            <div style={{display:"flex",gap:8,marginBottom:20,background:D.card,borderRadius:16,padding:5,border:`1px solid ${D.border}`}}>
              {[["apa","💧","Apă"],["facturi","🏢","Tabel Admin"]].map(([id,emoji,lbl])=>(
                <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 8px",borderRadius:12,border:"none",background:tab===id?D.blue:"transparent",color:tab===id?"#fff":D.sub,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  <span>{emoji}</span>{lbl}
                </button>
              ))}
            </div>
            {tab==="apa"&&<TabApa citiri={citiri} setCitiri={setCitiri}/>}
            {tab==="facturi"&&<TabFacturi facturi={facturi} setFacturi={setFacturi}/>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
